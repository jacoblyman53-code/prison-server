name: PrisonCrates
version: '1.0.0'
main: com.prison.crates.CratePlugin
api-version: '1.21'
description: Physical crate and key system for the prison server.

depend:
  - PrisonDatabase
  - PrisonPermissions
  - PrisonEconomy

commands:
  crate:
    description: Admin crate management command.
    usage: /crate <give|setblock|removeblock|reload|simulate>
    permission: prison.admintoolkit.crates
