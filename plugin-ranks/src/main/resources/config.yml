# ================================================================
# Prison Server — Mine Rank Configuration
# ================================================================
# Define the cost, display name, and chat prefix for each rank.
# All values are configurable — no hardcoded costs anywhere.
#
# cost:        IGC balance required to rank up FROM this rank
# display:     Egyptian name shown in GUIs and chat
# prefix:      MiniMessage format string used in chat
# ================================================================

# Default autoteleport setting for new players (can be toggled per-player with /rankup autoteleport toggle)
autoteleport-default: true

# Message sent on successful rankup. Supports MiniMessage.
# {rank} = the new rank letter, {display} = the rank display name
rankup-message: "<green>You have ascended to <gold><bold>{display}</bold></gold>! Keep mining."
rankup-broadcast: "<gold><bold>{player}</bold></gold> <yellow>has risen to <gold><bold>{display}</bold></gold><yellow>!"
# Ranks to broadcast (leave empty to broadcast all, or list specific letters)
rankup-broadcast-ranks:
  - G
  - J
  - O
  - T
  - Z

# Message when player can't afford rankup
cannot-afford-message: "<red>You need <gold>{cost} Coins</gold> to rank up. You have <gold>{balance} Coins</gold>."

# Message when player is already max rank (Z) — directs them to Ascension
max-rank-message: "<gold>You are <bold>Pharaoh</bold> — the highest mine rank! <light_purple>Type <bold>/prestige</bold> to begin your Ascension."

