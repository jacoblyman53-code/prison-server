name: PrisonRanks
version: 1.0.0
main: com.prison.ranks.RankPlugin
api-version: '1.21'
description: Mine rank progression system for the Prison server
authors: [prison-server]

depend:
  - PrisonDatabase
  - PrisonPermissions

softdepend:
  - PrisonMines
  - PrisonQuests

commands:
  rankup:
    description: Rank up to the next mine rank
    usage: /rankup [max|autoteleport toggle]
    permission: prison.sell
  ranks:
    description: View rank progression GUI
    usage: /ranks
    permission: prison.sell
