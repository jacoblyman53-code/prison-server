# Maximum gang members by donor rank (default applies to non-donors)
max-members: 10
donor-max-members:
  donor: 12
  donorplus: 14
  elite: 16
  eliteplus: 20

# Bank balance thresholds for gang levels 2 through 10
# Gang starts at level 1; reaches level 2 at 50000 bank balance, etc.
level-thresholds:
  - 50000
  - 150000
  - 350000
  - 750000
  - 1500000
  - 3000000
  - 5000000
  - 8000000
  - 12000000

# Invite expires after this many seconds if not accepted
invite-expire-seconds: 120

# IGC sell multiplier per gang level (1.0 = no bonus, 1.05 = +5%)
# Level 1 has no bonus. Each higher level adds a scaling benefit.
sell-bonuses:
  1:  1.00
  2:  1.02
  3:  1.04
  4:  1.06
  5:  1.08
  6:  1.10
  7:  1.12
  8:  1.15
  9:  1.18
  10: 1.22

# Token earn multiplier per gang level (applies to all token income)
token-bonuses:
  1:  1.00
  2:  1.02
  3:  1.04
  4:  1.06
  5:  1.08
  6:  1.10
  7:  1.12
  8:  1.15
  9:  1.18
  10: 1.22
