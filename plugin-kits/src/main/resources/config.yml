# ================================================================
# Prison Server — Kit System Configuration
# ================================================================
#
# Kit types:
#   FREE   — available to all players, timer cooldown
#   DONOR  — requires a donor rank; claimable after server restart
#            AND min-cooldown-hours must have elapsed since last claim
#
# Tier philosophy (OP Prison):
#   Starter     — iron gear to get going (all players, one-time)
#   Daily       — consumable refill (all players, 24h)
#   Donor T1    — full diamond, Protection cap 4–5
#   Top Tier    — netherite, max vanilla enchant +1 ONLY on key stats
#                 (power comes from custom enchants, not vanilla stacking)
#
# Cooldown scaling: 24h → 18h → 12h → 8h (donor tier 1 → top tier)
#
# Contents format per item:
#   material: MATERIAL_NAME
#   amount:   1
#   enchants: (optional map of enchant name → level)
#     EFFICIENCY: 3
#   display: "Custom Name"   (optional MiniMessage string)

kits:

  # ------------------------------------------------------------------
  # FREE kits
  # ------------------------------------------------------------------

  starter:
    display: "<color:#E8C87A>Condemned Soul's Rations"
    type: FREE
    cooldown-hours: 0       # 0 = one-time only
    contents:
      - material: STONE_PICKAXE
        amount: 1
        display: "<!italic><gray>Worn Chisel"
      - material: BREAD
        amount: 16
      - material: TORCH
        amount: 8

  daily:
    display: "<yellow>Daily Kit"
    type: FREE
    cooldown-hours: 24
    contents:
      - material: BREAD
        amount: 16
      - material: COOKED_BEEF
        amount: 8
      - material: EXPERIENCE_BOTTLE
        amount: 4

  # ------------------------------------------------------------------
  # RANK kits — milestone rewards for reaching specific mine ranks
  # type: FREE with a required-rank permission node (checked in KitsManager)
  # cooldown-hours: 0 = one-time only (rank milestone kits are one-time)
  # ------------------------------------------------------------------

  rankE:
    display: "<green>Rank E Kit"
    type: RANK
    required-rank: E
    cooldown-hours: 0
    contents:
      - material: IRON_PICKAXE
        amount: 1
        enchants:
          EFFICIENCY: 3
          UNBREAKING: 2
          FORTUNE: 1
      - material: IRON_CHESTPLATE
        amount: 1
        enchants:
          PROTECTION: 2
          UNBREAKING: 2
      - material: COOKED_BEEF
        amount: 32
      - material: EXPERIENCE_BOTTLE
