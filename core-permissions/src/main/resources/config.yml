# ================================================================
# Prison Server — Permission Engine Configuration
# ================================================================
# Define what permissions each rank group grants.
# Changes here require a server restart to take effect.
#
# Format:
#   groups:
#     <group-node>:
#       - permission.node.one
#       - permission.node.two
# ================================================================

groups:

  # ---- MINE RANKS ----
  # Each rank grants access to mine at that level and below.
  # Players only access their current rank's mine — not all previous mines.

  'prison.rank.a':
    - prison.mine.a
    - prison.sell
    - prison.kit.starter
    - prison.kit.daily

