  # ---- DONOR RANKS ----
  # Completely separate from mine ranks — never inherit from each other.

  'prison.donor.donor':
    - prison.autosell
    - prison.kit.donor
    - prison.donor.mines

  'prison.donor.donorplus':
    - prison.autosell
    - prison.kit.donorplus
    - prison.donor.mines

  'prison.donor.elite':
    - prison.autosell
    - prison.kit.elite
    - prison.donor.mines

  'prison.donor.eliteplus':
    - prison.autosell
    - prison.kit.eliteplus
    - prison.donor.mines

  # ---- STAFF RANKS ----
  # Staff inherit downward — admin has all moderator and helper permissions too.
  # Only define what each rank adds on top of the rank below it.

  'prison.staff.helper':
    - prison.staff.helper
    - prison.mute
    - prison.slowchat
    - prison.tp.players
    - prison.vanish

  'prison.staff.moderator':
    - prison.kick
    - prison.tempban
    - prison.freeze
    - prison.invsee
    - prison.tp.anywhere
    - prison.reports

  'prison.staff.seniormod':
    - prison.ban
    - prison.ipban
    - prison.transactions.view

  'prison.staff.admin':
    - prison.admintoolkit.use
    - prison.admintoolkit.economy
    - prison.admintoolkit.ranks
    - prison.admintoolkit.mines
    - prison.admintoolkit.crates
    - prison.admintoolkit.regions
    - prison.admintoolkit.servercontrols
    - prison.admin.*

  'prison.staff.senioradmin':
    - prison.staff.manage.admin

  'prison.staff.owner':
    - '*'
