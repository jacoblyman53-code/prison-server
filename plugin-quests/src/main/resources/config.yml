    description: "Break 10,000 blocks in any mine this week"
    type: BLOCKS_MINED
    tier: WEEKLY
    goal: 10000
    icon: DIAMOND_PICKAXE
    igc: 500000
    tokens: 1000

  rankup_weekly:
    title: "Rank Up 3 Times"
    description: "Use /rankup 3 times this week"
    type: RANKUPS
    tier: WEEKLY
    goal: 3
    icon: NETHER_STAR
    igc: 250000
    tokens: 500

  # ─────────────────────────── MILESTONE ───────────────────────

  first_sell:
    title: "First Sale!"
    description: "Complete your very first sell"
    type: SELL_COMMANDS
    tier: MILESTONE
