# ================================================================
# Prison Server — Mines Configuration
# ================================================================

# Blocks processed per tick during a mine reset.
# 1000 = ~25 ticks (1.25s) for a 50x50x10 mine. Raise for faster resets,
# lower if you notice TPS drops during resets.
reset-batch-size: 1000

# Message broadcast to players inside a mine when it begins resetting.
reset-warning-message: "<gold>[Mine {mine}]</gold> <gray>Mine is resetting — stand clear!"
reset-done-message: "<gold>[Mine {mine}]</gold> <green>Reset complete."

# ---- Mine Definitions ----
# Set up each mine with /mine setcorner1 <id>, /mine setcorner2 <id>,
# /mine setspawn <id>, then /mine enable <id> to activate it.
#
# Fields:
#   enabled         — false until you've set corners and spawn
#   display         — MiniMessage name shown in GUIs
#   world           — world name (usually "world")
#   corner1/corner2 — [x, y, z] bounding box corners (any two opposite corners)
#   spawn-x/y/z     — where players are teleported during resets and on /mine tp
#   spawn-yaw/pitch — look direction at spawn
#   composition     — block type to % weight (must sum to 100)
#   sell-prices     — IGC per block (leave empty {} to use economy plugin defaults)
#   reset-timer-mins — auto-reset every N minutes (0 = disabled)
#   reset-threshold  — auto-reset when this fraction of blocks mined (0 = disabled)
#   permission-node  — required permission to mine here
#   mine-type        — STANDARD | DONOR | PRESTIGE
#   prestige-required — minimum prestige level (PRESTIGE type only)

mines:
  A:
    enabled: false
    display: "<gray>[<white>A</white>]</gray>"
    world: "world"
    corner1: [0, 64, 0]
    corner2: [0, 64, 0]
    spawn-x: 0.5
    spawn-y: 66.0
    spawn-z: 0.5
    spawn-yaw: 0.0
    spawn-pitch: 0.0
    composition:
      STONE: 90
      COAL_ORE: 10
    sell-prices: {}
    reset-timer-mins: 15
    reset-threshold: 0.80
    permission-node: "prison.mine.a"
    mine-type: "STANDARD"
    prestige-required: 0
